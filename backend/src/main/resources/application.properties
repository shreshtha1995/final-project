# ===== Server =====
server.port=8081

# ===== MySQL Database =====
# The database is created automatically on first run (createDatabaseIfNotExist=true)
spring.datasource.url=jdbc:mysql://localhost:3306/campus_sync12?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# update = create tables from entities, keep data between restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
# Secret must be long enough for HS256 (>= 32 chars). Token valid for 24h.
app.jwt.secret=campus-sync-super-secret-key-change-me-in-production-1234567890
app.jwt.expiration-ms=86400000

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== File upload (PG images) =====
# storage type: "local" (works on the corporate network/offline) or "cloudinary" (CDN, for deployment).
# NOTE: Cloudinary is blocked by Cognizant's SSL inspection on the office network; use "local" here
# and switch this single line to "cloudinary" when deploying off the corporate network.
app.storage.type=local
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ===== Cloudinary =====
# Tip: for production, override these with environment variables instead of committing them.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dhhcjip6l}
cloudinary.api-key=${CLOUDINARY_API_KEY:116915968727428}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:O7hWwpeIkqCkgX9ri8MpFII5eWs}
cloudinary.folder=campussync
